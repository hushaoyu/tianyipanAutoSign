name: Cloud check in action
on:
  push:
    branches:
      - master
  watch:
    types: started
  workflow_dispatch:
  schedule:
    - cron: 0 7 * * *
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: user
    steps:
      - name: 🔀 随机延迟（早上）
        if: github.event.schedule == '0 7 * * *'
        run: |
          delay=$((RANDOM % 60))
          echo "早上签到，延迟 $delay 秒后开始.."
          sleep $delay

      - name: 🔀 随机延迟（手动触发）
        if: github.event_name == 'workflow_dispatch'
        run: |
          delay=$((RANDOM % 30))
          echo "手动触发，延迟 $delay 秒后开始.."
          sleep $delay

      - name: 🔌 Check out code
        uses: actions/checkout@main

      - name: 🔨 Setup Node.js environment
        uses: actions/setup-node@main
        with:
          node-version: 18
          cache: npm

      - name: 👾 Check if Debug is true
        if: vars.debug == '1'
        run: |
          echo "CLOUD189_VERBOSE=1" >> $GITHUB_ENV
      
      - name: 📹 Restore cached Cookie
        id: cache-cookie-restore
        uses: actions/cache/restore@v4
        with:
          path: .token
          key: cloud189-token-${{ hashFiles('.token/*.json') }}
          restore-keys: cloud189-token-

      - name: 🔧 Init secrets
        uses: shine1594/secrets-to-env-action@master
        with:
          secrets: ${{ toJSON(secrets) }}
          secrets_env: production
          prefix_prod: ""
          file_name_prod: .env

      - name: 📡 Init dependencies
        run: npm install

      - name: 🚀 Run
        uses: nick-fields/retry@master
        with:
          timeout_minutes: 30
          max_attempts: 3
          command: npm start

      - name: 🔑 Compute token hash
        if: always()
        run: |
          NEW_HASH=$(find .token -name '*.json' -exec sha256sum {} \; 2>/dev/null | sha256sum | cut -d' ' -f1)
          echo "TOKEN_HASH=${NEW_HASH}" >> $GITHUB_ENV

      - name: 📹 Save cached Cookie
        if: always() && env.TOKEN_HASH != ''
        uses: actions/cache/save@v4
        with:
          path: .token
          key: cloud189-token-${{ env.TOKEN_HASH }}



      - name: 🎉 清理旧的工作流记录
        uses: Mattraks/delete-workflow-runs@main
        if: always()
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 60